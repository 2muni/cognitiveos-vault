name: Bug report
description: Report a reproducible CognitiveOS problem without sharing private vault content.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste private note text, frontmatter values, absolute vault paths, access tokens, or model-cache paths. Use a minimal synthetic note and redact identifiers from logs.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed result and the result you expected.
      placeholder: "Expected search to return ...; instead it ..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: List the smallest safe steps and commands that reproduce the issue. Replace private note contents with synthetic examples.
      placeholder: |
        1. Create a test vault with this synthetic note ...
        2. Run `cognitiveos-index ...`
        3. Run `cognitiveos-search ...`
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CognitiveOS version or commit
      description: Include `cognitiveos.__version__`, `cognitiveos-mcp --version`, or a Git commit/tag.
      placeholder: "0.3.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Indexer (`cognitiveos-index`)
        - Search CLI (`cognitiveos-search`)
        - MCP server
        - Embedding builder (`cognitiveos-embed`)
        - Embedding evaluation
        - Documentation or packaging
        - Other
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system and architecture
      placeholder: "macOS 15.0, x86_64"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.12.13"
    validations:
      required: true
  - type: dropdown
    id: index_state
    attributes:
      label: Local index state
      description: The index is derived data; choose the closest state before the issue.
      options:
        - Freshly rebuilt
        - Existing index reused
        - Missing or intentionally removed
        - Unknown
    validations:
      required: true
  - type: dropdown
    id: semantic_mode
    attributes:
      label: Semantic mode
      options:
        - off
        - auto
        - required
        - Not applicable
    validations:
      required: true
  - type: textarea
    id: semantic_identity
    attributes:
      label: Semantic runtime details (if applicable)
      description: Provide provider, model id, immutable revision, and device. Do not include cache paths.
      placeholder: "sentence-transformers; intfloat/multilingual-e5-small; fd1525a9...; cpu"
  - type: textarea
    id: logs
    attributes:
      label: Redacted output or traceback
      description: Paste relevant, redacted output. Remove note text, titles, paths, tokens, and personal identifiers.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private vault content, absolute paths, credentials, and model-cache locations from this report.
          required: true
